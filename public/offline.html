<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline · OlamideVerse</title>
    <style>
      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #f4efe6;
        color: #181410;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .chip {
        display: inline-block;
        background: #f5b301;
        color: #181410;
        padding: 0.35rem 0.9rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.75rem;
        transform: rotate(-1deg);
        margin-bottom: 1.25rem;
      }
      h1 {
        font-size: 1.6rem;
        margin: 0 0 0.5rem;
      }
      p {
        max-width: 32rem;
        line-height: 1.5;
        color: #4a423a;
      }
    </style>
  </head>
  <body>
    <div>
      <span class="chip">Fan Archive — Offline</span>
      <h1>No connection right now</h1>
      <p>
        OlamideVerse needs a connection to load new pages. Anything you've
        already visited is still cached — try going back, or reconnect and
        reload.
      </p>
    </div>
  </body>
</html>

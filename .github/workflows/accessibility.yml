name: Accessibility Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/components/**'
      - 'src/hooks/**'
      - '**/*.test.tsx'
      - '**/*.test.ts'

jobs:
  accessibility-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run accessibility tests
        run: npm test -- --testPathPattern="accessibility" --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: accessibility
          name: accessibility-coverage

      - name: Comment PR with accessibility results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read test results if available
            try {
              const testResults = fs.readFileSync('./coverage/accessibility-report.json', 'utf8');
              const results = JSON.parse(testResults);

              const comment = `## 🔍 Accessibility Test Results

              ✅ **Tests Passed**: ${results.numPassedTests}
              ${results.numFailedTests > 0 ? `❌ **Tests Failed**: ${results.numFailedTests}` : ''}

              ### Coverage
              - **Statements**: ${results.coverage.statements}%
              - **Branches**: ${results.coverage.branches}%
              - **Functions**: ${results.coverage.functions}%
              - **Lines**: ${results.coverage.lines}%

              ${results.numFailedTests > 0 ? '⚠️ Please fix accessibility issues before merging.' : '🎉 All accessibility tests passed!'}
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not read test results:', error.message);
            }

<!-- @dsCard group="Components" name="Pull quote" subtitle="Editorial oversized quote block" width="760" height="380" -->
<meta charset="utf-8">
<style>
  @import url('../fonts/fonts.css');
  :root{--danfo:#F5B301;--adire:#1F2A63;--ink:#181410;--paper:#F4EFE6;--oxide:#C8451B;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);padding:40px 32px}
  blockquote{position:relative;max-width:620px;border-left:8px solid var(--danfo);padding-left:26px}
  blockquote p{font-family:'Anton',Impact,sans-serif;font-size:2.4rem;line-height:1.05;text-transform:uppercase}
  blockquote p .ink-hl{background:var(--ink);color:var(--danfo);padding:0 .1em}
  cite{display:block;margin-top:16px;font-style:normal;font-size:.85rem;text-transform:uppercase;letter-spacing:.1em;color:#4A423A}
  cite b{color:var(--adire)}
</style>
<blockquote>
  <p>The street chose him, then the <span class="ink-hl">country followed.</span></p>
  <cite><b>Era 03 — The Street King Run</b> · editorial voice, used once per chapter</cite>
</blockquote>

<!-- @dsCard group="Components" name="Buttons" subtitle="Primary / secondary / ghost + hover" width="720" height="420" -->
<meta charset="utf-8">
<style>
  @import url('../fonts/fonts.css');
  :root{--danfo:#F5B301;--adire:#1F2A63;--ink:#181410;--paper:#F4EFE6;--oxide:#C8451B;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);padding:32px}
  h1{font-family:'Anton',Impact,sans-serif;font-size:2rem;text-transform:uppercase;margin-bottom:20px}
  .set{display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:26px}
  .btn{font-family:'Archivo',sans-serif;font-weight:700;font-size:.95rem;text-transform:uppercase;letter-spacing:.06em;
    padding:14px 26px;border:3px solid var(--ink);cursor:pointer;background:#fff;color:var(--ink);
    box-shadow:4px 4px 0 var(--ink);transition:transform .12s ease,box-shadow .12s ease,background .12s ease}
  .btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .btn-primary{background:var(--danfo)}
  .btn-primary:hover{background:#FFC71F}
  .btn-dark{background:var(--ink);color:var(--paper)}
  .btn-dark:hover{background:var(--adire)}
  .btn-ghost{background:transparent;box-shadow:none;border-color:transparent;text-decoration:underline;text-underline-offset:5px;text-decoration-thickness:3px;text-decoration-color:var(--danfo)}
  .btn-ghost:hover{transform:none;color:var(--oxide)}
  .note{font-size:.85rem;color:#4A423A;max-width:56ch}
</style>
<h1>Buttons</h1>
<div class="set">
  <button class="btn btn-primary">Explore the Eras</button>
  <button class="btn btn-dark">Browse Discography</button>
  <button class="btn btn-ghost">Watch the freestyles →</button>
</div>
<p class="note">Hard shadows, sharp corners, uppercase Archivo. Hover lifts (shadow grows), press stamps (shadow collapses). One danfo-primary per viewport; everything else goes dark or ghost.</p>

<!-- @dsCard group="Components" name="Track row + embed frame" subtitle="Tracklist row with styled embed wrapper" width="760" height="520" -->
<meta charset="utf-8">
<style>
  @import url('../fonts/fonts.css');
  :root{--danfo:#F5B301;--adire:#1F2A63;--ink:#181410;--paper:#F4EFE6;--oxide:#C8451B;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);padding:32px}
  .list{max-width:640px;border-top:6px solid var(--ink)}
  .row{display:flex;align-items:center;gap:16px;padding:14px 6px;border-bottom:2px solid var(--ink);cursor:pointer}
  .row:hover{background:#fff}
  .n{font-family:'Anton',Impact,sans-serif;font-size:1.1rem;width:2ch;color:#4A423A}
  .t{flex:1;font-weight:600;font-size:1.05rem}
  .t small{display:block;font-weight:400;font-size:.78rem;color:#4A423A;text-transform:uppercase;letter-spacing:.05em}
  .len{font-variant-numeric:tabular-nums;font-size:.85rem;color:#4A423A}
  .play{width:38px;height:38px;border:3px solid var(--ink);background:var(--danfo);display:grid;place-items:center;box-shadow:3px 3px 0 var(--ink)}
  .row:hover .play{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
  .play svg{width:14px;height:14px;fill:var(--ink)}
  .embed{max-width:640px;margin-top:22px;border:3px solid var(--ink);box-shadow:6px 6px 0 var(--ink);background:#fff}
  .embed .bar{display:flex;justify-content:space-between;align-items:center;background:var(--ink);color:var(--paper);padding:8px 12px;font-size:.75rem;text-transform:uppercase;letter-spacing:.1em}
  .embed .bar b{color:var(--danfo)}
  .embed .slot{height:110px;display:grid;place-items:center;color:#4A423A;font-size:.85rem;background:repeating-linear-gradient(-45deg,#fff,#fff 12px,#F4EFE6 12px,#F4EFE6 24px)}
</style>
<div class="list">
  <div class="row"><span class="n">01</span><span class="t">Durosoke<small>YBNL · 2012</small></span><span class="len">3:26</span><span class="play"><svg viewBox="0 0 16 16"><path d="M3 1l11 7-11 7z"/></svg></span></div>
  <div class="row"><span class="n">02</span><span class="t">First of All<small>YBNL · 2012</small></span><span class="len">3:58</span><span class="play"><svg viewBox="0 0 16 16"><path d="M3 1l11 7-11 7z"/></svg></span></div>
</div>
<div class="embed">
  <div class="bar"><span>Now playing — <b>Durosoke</b></span><span>via Spotify</span></div>
  <div class="slot">third-party player mounts here, inside the identity frame</div>
</div>

<meta charset="utf-8">
<style>
  @import url('../fonts/fonts.css');
  :root{--danfo:#F5B301;--adire:#1F2A63;--ink:#181410;--paper:#F4EFE6;--oxide:#C8451B;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink)}
  .micro{background:var(--ink);color:#B8AFA2;text-align:center;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px}
  .micro b{color:var(--danfo);font-weight:600}
  header{display:flex;justify-content:space-between;align-items:center;padding:18px 32px;border-bottom:6px solid var(--ink);background:var(--paper)}
  .mark{font-family:'Anton',Impact,sans-serif;font-size:1.7rem;text-transform:uppercase;letter-spacing:.01em}
  .mark span{background:var(--danfo);padding:0 .12em}
  nav{display:flex;gap:26px;align-items:center}
  nav a{color:var(--ink);text-decoration:none;font-weight:600;font-size:.9rem;text-transform:uppercase;letter-spacing:.07em;padding-bottom:3px;border-bottom:3px solid transparent}
  nav a:hover{border-color:var(--danfo)}
  nav a.active{border-color:var(--ink)}
  .ticker{overflow:hidden;background:var(--danfo);border-bottom:3px solid var(--ink);white-space:nowrap;padding:7px 0;font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.14em}
